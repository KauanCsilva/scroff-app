name: scroff
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  usage_stats: ^1.3.1
  device_info_plus: ^11.0.0
  installed_apps: ^1.4.0
  firebase_core: ^4.8.0
  firebase_auth: ^6.5.0
  cloud_firestore: ^6.4.1
  intl: ^0.20.2
  confetti: ^0.8.0
  audioplayers: ^6.0.0
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/avatars/
    - assets/badges/
    - assets/logo/


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/logo_b.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"